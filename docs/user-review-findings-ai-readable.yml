schema_version: "1.0"
document_type: "user_review_findings"
created_at: "2026-04-30"
language: "ja"
scope:
  app: "ネットワークスペシャリスト学習アプリ"
  review_perspective: "ユーザ視点"
  platforms:
    - "PC"
    - "スマホ"
  note: "エンジニアまたは実装AIに渡すための指摘事項。コード変更はこの文書には含めない。"

findings:
  - id: "UX-001"
    priority: "high"
    title: "答え合わせモードの採点ボタンの誤タップ対策"
    target_screens:
      - "午後問題の解答欄ページ"
      - "答え合わせモード"
    user_problem: >
      各解答欄に表示される「○」「△」「×」ボタンの横の間隔が狭く、
      スマホで連続採点すると隣のボタンを誤タップしやすい。
    requirements:
      - "「○」「△」「×」ボタン同士の横間隔を広げる。"
      - "スマホで指で押しても隣のボタンに触れにくい余白を確保する。"
      - "ボタン自体のサイズは大きくしすぎず、まずは横方向のgap調整を優先する。"
    acceptance_criteria:
      - "スマホ幅で「○」「△」「×」の各ボタンが視覚的に分離して見える。"
      - "連続採点時に隣接ボタンを押し間違えにくい間隔になっている。"
      - "PC版の表レイアウトが不自然に間延びしない。"

  - id: "UX-002"
    priority: "high"
    title: "演習履歴の削除時に確認画面を出す"
    target_screens:
      - "午後問題演習補助ツール"
      - "問題行の展開部分"
      - "演習履歴"
    user_problem: >
      演習履歴のゴミ箱ボタンを押すと即削除される。
      点数・実施日・メモはユーザにとって重要な記録なので、誤操作対策が必要。
    requirements:
      - "ゴミ箱ボタン押下時に確認ダイアログを表示する。"
      - "確認ダイアログでキャンセルできるようにする。"
      - "ユーザが明示的に削除を確定した場合のみ記録を削除する。"
    suggested_copy:
      dialog_title: "この演習記録を削除しますか？"
      dialog_body: "削除した記録は元に戻せません。"
      cancel_button: "キャンセル"
      confirm_button: "削除する"
    acceptance_criteria:
      - "ゴミ箱ボタンを押しただけでは演習履歴が削除されない。"
      - "確認ダイアログで「キャンセル」を押すと記録が残る。"
      - "確認ダイアログで「削除する」を押すと対象の1件だけが削除される。"

  - id: "UX-003"
    priority: "medium"
    title: "スマホ版のみ記述欄の高さを少し広げる"
    target_screens:
      - "午後問題の解答欄ページ"
      - "スマホ表示"
    user_problem: >
      スマホでは記述式の入力欄がやや狭く、
      文章問題の入力や見直しがしづらい。
    requirements:
      - "スマホ表示時のみ、記述式textareaの初期高さを少し広げる。"
      - "PC版の表示は現状維持とする。"
      - "目安として、現在より1〜2行分程度高くする。"
    acceptance_criteria:
      - "スマホ幅で記述欄の入力内容を確認しやすくなる。"
      - "表全体の横幅や設問列の表示が崩れない。"
      - "PC幅では現在の見た目から大きく変化しない。"

  - id: "UX-004"
    priority: "medium"
    title: "公式解答例ページのボタン配置を整理する"
    target_screens:
      - "午後問題の公式解答例ページ"
    user_problem: >
      上部に「解答欄で練習する」、下部に再度「解答欄で練習する」と
      「公式PDFを開く」があり、導線が重複している。
      また、問題PDFへの導線は上部の主要操作として見える方が自然。
    requirements:
      - "上部の「解答欄で練習する」ボタンの左側に「問題PDF」ボタンを追加する。"
      - "上部のボタン並びを「問題PDF」「解答欄で練習する」にする。"
      - "下部の「解答欄で練習する」ボタンを削除する。"
      - "下部の「公式PDFを開く」ボタンを削除する。"
    acceptance_criteria:
      - "公式解答例ページ上部で問題PDFを開ける。"
      - "公式解答例ページ上部で解答欄ページへ移動できる。"
      - "ページ下部に重複した練習ボタンや公式PDFボタンが残っていない。"

  - id: "UX-005"
    priority: "medium"
    title: "学習履歴の全件表示ページに経験値推移グラフを追加する"
    target_screens:
      - "学習履歴（全件）ページ"
    user_problem: >
      学習履歴の全件表示ページでは過去の学習記録は確認できるが、
      経験値がどのように積み上がっているかを視覚的に確認できない。
      継続学習のモチベーションにつながるため、経験値推移グラフを追加したい。
    graph_requirements:
      chart_type: "複合グラフ"
      x_axis: "日付"
      bar_series:
        label: "累計経験値"
        description: "日付ごとの累計XPを棒グラフで表示する。"
      line_series:
        label: "1日の獲得経験値"
        description: "日付ごとの獲得XPを折れ線グラフで表示する。"
      aggregation:
        unit: "日単位"
        rule: "同じ日付に複数の経験値獲得がある場合は合算する。"
    placement_requirements:
      - "学習履歴（全件）ページの上部、履歴一覧の前にグラフを表示する。"
      - "棒グラフと折れ線グラフは同じグラフ内に重ねて表示する。"
      - "データがない場合はグラフ領域に「経験値の記録はまだありません」と表示する。"
      - "スマホでは横幅が不足しやすいため、直近30日分を初期表示にする。"
      - "全期間を見る操作は必要なら横スクロールで対応する。"
    acceptance_criteria:
      - "日付ごとの累計XPが棒グラフで確認できる。"
      - "日付ごとの獲得XPが折れ線グラフで確認できる。"
      - "同日に複数のXP獲得がある場合、1日分として合算される。"
      - "履歴がない状態でも画面が空白にならず、空状態メッセージが表示される。"

  - id: "UX-006"
    priority: "medium"
    title: "プロトコル一覧のレイヤーフィルタを折り畳み形式にする"
    target_screens:
      - "プロトコル一覧"
      - "スマホ表示"
    user_problem: >
      現在、レイヤーフィルタが横並びで、スマホでは右側の選択肢が画面外に隠れる。
      横スクロールではなく、折り畳み形式に変更したい。
    requirements:
      - "スマホ版では「レイヤーで絞り込み」の折り畳みUIにする。"
      - "折り畳みを開いた時だけレイヤー選択肢を表示する。"
      - "選択後は折り畳みを閉じる。"
      - "現在選択中のレイヤーが分かるように表示する。"
      - "PC版は現状の横並びのままでよい。"
    filter_options:
      - "すべて"
      - "L2・データリンク"
      - "L3・ネットワーク"
      - "L4・トランスポート"
      - "L7・アプリケーション"
    acceptance_criteria:
      - "スマホ幅でレイヤーフィルタが横にはみ出さない。"
      - "折り畳みを開くと全レイヤー選択肢を確認できる。"
      - "選択中のレイヤーが折り畳みUI上で確認できる。"
      - "PC版の既存フィルタUIは維持される。"

  - id: "UX-007"
    priority: "medium"
    title: "午後問題詳細系ページの下部に問題一覧ボタンを追加する"
    target_screens:
      - "午後問題の解答欄ページ"
      - "午後問題の公式解答例ページ"
    user_problem: >
      詳細ページから午後問題演習補助ツールのトップに戻る導線が下部にない。
      解答や確認を終えた後、長いページの下部から問題一覧へ戻りづらい。
    requirements:
      - "ページ下部に「問題一覧へ戻る」ボタンを追加する。"
      - "遷移先は午後問題演習補助ツールのトップにする。"
      - "既存の上部「戻る」は残してよい。"
      - "長いページを読み終えた後の導線として、下部ボタンを追加する。"
    acceptance_criteria:
      - "午後問題の解答欄ページ下部から午後問題一覧へ戻れる。"
      - "午後問題の公式解答例ページ下部から午後問題一覧へ戻れる。"
      - "上部の既存戻る導線は壊れない。"
